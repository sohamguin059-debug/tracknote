<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOTES APP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <header>
      <h1>NOTES</h1>
      <p>CREATE, EDIT, DELETE and VIEW your notes quickly.</p>
    </header>

    <section class="form-panel">
      <h2 id="form-title">CREATE NOTE</h2>
      <form id="note-form">
        <input id="note-id" type="hidden" value="" />
        <label>
          Title
          <input id="note-title" type="text" placeholder="Note title" required />
        </label>
        <label>
          CONTENT
          <textarea id="note-content" placeholder="Write your note..." rows="4" required></textarea>
        </label>
        <button type="submit">Save Note</button>
        <button id="cancel-edit" type="button" class="hidden">Cancel Edit</button>
      </form>
    </section>

    <section>
      <h2>All Notes</h2>
      <div id="notes-list" class="notes-grid"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
